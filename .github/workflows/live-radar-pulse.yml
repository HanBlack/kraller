# Počká 2 min → dokončí → spustí Live radar update (smyčka bez git push).

name: Live radar pulse

on:
  workflow_run:
    workflows: ["Live radar update"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: live-radar-pulse
  cancel-in-progress: false

jobs:
  pulse:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait before next radar fetch
        run: sleep 120
