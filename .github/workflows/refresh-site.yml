# Každých 5 min: stáhne OPERA/vítr/vznik → build → nasadí na kraller.eu
# Bez commitu do gitu — data jdou rovnou na GitHub Pages.

name: Refresh site data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch OPERA, wind, formation
        run: npm run data:update

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
