# Deploy po pushi kódu. Obnova radaru: live-radar.yml → Cloudflare R2.

name: Publish site

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "public/data/**"
  workflow_dispatch:
    inputs:
      full_update:
        description: "Stáhnout i vítr a vznik (pomalejší)"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kraller-publish
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch storm data
        run: npm run data:update

      - name: Build site
        env:
          VITE_DATA_ROOT: ${{ secrets.VITE_DATA_ROOT }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
