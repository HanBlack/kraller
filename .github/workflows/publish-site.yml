# Deploy na GitHub Pages. Obnova dat: radar-loop.yml → git push → tento workflow.

name: Publish site

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "2/5 * * * *"
  workflow_dispatch:
    inputs:
      full_update:
        description: "Stáhnout i vítr a vznik (pomalejší)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kraller-publish
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore: refresh radar data') }}
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore: refresh radar data') }}
        run: pip install -r requirements.txt

      - name: Fetch storm data
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore: refresh radar data')) }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.full_update }}" = "true" ]; then
            npm run data:update
          else
            npm run data:radar
          fi

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
