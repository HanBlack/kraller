# Learning store — mimo rychlý radar loop (1× za hodinu).

name: Learning collect

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: learning-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Emit learning events
        run: python scripts/emit_learning.py

      - name: Commit learning data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/learning
          if git diff --staged --quiet; then
            echo "No learning changes."
          else
            git commit -m "chore: learning collect"
            git push
          fi
