# Learning store — záloha + proposal (primární emit je Live radar ~5 min).

name: Learning collect

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: learning-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Emit learning events
        run: python scripts/emit_learning.py

      - name: Propose calibration
        run: python scripts/propose_calibration.py

      - name: Commit learning + proposal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/learning public/data/calibration
          if git diff --staged --quiet; then
            echo "No learning changes."
          else
            git commit -m "chore: learning collect + calibration proposal"
            git push
          fi
