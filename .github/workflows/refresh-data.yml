# Obnova dat každých ~10 min → commit → push spustí Publish site.
# Spolehlivější než schedule přímo v deploy workflow (GitHub cron často neběží / zpoždění).

name: Refresh storm data

on:
  schedule:
    # UTC, mimo :00 kvůli zpožděním GitHub Actions
    - cron: "2,12,22,32,42,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch OPERA, wind, formation
        run: npm run data:update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh storm data"
          git push
