# Satelitní CTTH / LI cooling — odděleně od Live radar (neblokuje R2 radaru).
# Keep-last-good: empty/error/no_credentials nepřepíše poslední ok cooling.json.
# Na R2 sahá JEN do data/satellite/ — meta/formation vlastní Live radar (žádný race).
# Viz docs/RADAR-TRIGGER.md

name: Live sat

on:
  workflow_dispatch:
  schedule:
    # Sat je drahý (~CTTH ×3 + mask/type/LI) — pomalejší než radar
    - cron: "*/20 * * * *"

permissions:
  contents: write

concurrency:
  group: live-sat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch satellite cooling
        env:
          EUMETSAT_CONSUMER_KEY: ${{ secrets.CONSUMER_KEY_EUMETSAT }}
          EUMETSAT_CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET_EUMETSAT }}
        run: python scripts/fetch_sat_cooling.py

      - name: Upload sat to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/upload_data_r2.py --only data/satellite/

      - name: Git backup (satellite only)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/satellite
          if git diff --staged --quiet; then
            echo "No sat git backup changes."
          else
            git commit -m "chore: refresh satellite cooling"
            git pull --rebase origin main || true
            git push origin main || echo "WARN: sat git backup push failed (non-fatal, R2 already updated)"
          fi
