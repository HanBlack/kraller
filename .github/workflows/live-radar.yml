# Samoudržující smyčka: stáhne radar → deploy → za ~3 min spustí sebe znovu.
# Používá workflow_dispatch přes GITHUB_TOKEN (GitHub to povoluje, na rozdíl od push/workflow_run).

name: Live radar

on:
  workflow_dispatch:
  schedule:
    - cron: "2/5 * * * *"
  # Kickstart po každém Publish site (push kódu)
  workflow_run:
    workflows: ["Publish site"]
    types: [completed]

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: live-radar
  cancel-in-progress: false

jobs:
  update:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch OPERA radar + wind
        run: |
          npm run data:radar
          python - <<'PY'
          import os, subprocess, sys
          sys.path.insert(0, "scripts")
          from datetime import datetime, timezone
          from data_freshness import age_minutes, read_valid_at

          p = "public/data/formation/grid.json"
          age = (
              age_minutes(read_valid_at(p), datetime.now(timezone.utc))
              if os.path.isfile(p)
              else 999.0
          )
          print(f"formation age={age}")
          if age is None or age > 90:
              print("Refreshing formation grid…")
              subprocess.run([sys.executable, "scripts/fetch_formation.py"], check=False)
          PY
          python scripts/fetch_wind.py --force
          python scripts/write_meta.py || true

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Queue next refresh in 3 minutes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Next Live radar run in 180s…"
          sleep 180
          gh workflow run live-radar.yml --ref main
          echo "Queued next Live radar run."
