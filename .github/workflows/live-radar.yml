# Stáhne radar → R2 (rychlé CDN) + volitelný git backup.
# Mapa = národní mozaika (ČHMÚ/DWD/SHMÚ/IMGW/MCH) + OPERA fill; tracking = OPERA.
# Viz docs/RADAR-TRIGGER.md

name: Live radar

on:
  workflow_dispatch:
  repository_dispatch:
    types: [live-radar]
  schedule:
    # GitHub cron je nespolehlivý — záloha; hlavní je Cloudflare Cron Worker (*/2)
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: live-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if R2 already fresh
        id: gate
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          MAX_AGE_MIN: "6"
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/check_r2_fresh.py

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache OPERA + CHMI + national HDF5
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            .cache/opera
            .cache/chmi
            .cache/chmi_dualpol
            .cache/national
          key: radar-h5-v3-${{ github.run_id }}
          restore-keys: |
            radar-h5-v3-
            radar-h5-v2-
            radar-h5-v1-

      - name: Install Python deps
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Fetch OPERA + national mosaics
        if: steps.gate.outputs.skip != 'true'
        run: |
          # OPERA (tracking + fill) a národní compositý paralelně
          python scripts/opera_fetch_convert.py --frames 7 &
          pid_opera=$!
          python scripts/fetch_national_radar.py --sources chmi,dwd,shmu,imgw,mch &
          pid_nat=$!
          wait $pid_opera || { echo "ERROR: opera_fetch failed"; exit 1; }
          wait $pid_nat || echo "WARN: national fetch partial/failed"
          python scripts/build_radar_mosaic.py \
            || echo "WARN: mosaic failed — keeping OPERA PNG"
          python scripts/write_meta.py

      - name: Fast-path upload (PNG + cells + meta)
        if: steps.gate.outputs.skip != 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          mkdir -p public/data/opera public/data/national
          if [ ! -f public/data/opera/mosaic-meta.json ]; then
            echo '{"radarSource":"opera"}' > public/data/opera/mosaic-meta.json
          fi
          python scripts/upload_data_r2.py \
            --files data/meta.json \
            --files data/opera/latest.png \
            --files data/opera/latest-raster.json \
            --files data/opera/mosaic-meta.json \
            --files data/opera/latest.geojson \
            --files data/opera/cells.geojson \
            --only data/opera/history/ \
            --only data/national/

      - name: Enrich (ČHMÚ cells + dual-pol + env) + full meta
        if: steps.gate.outputs.skip != 'true'
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python scripts/chmi_radar.py \
            || echo "WARN: chmi_radar failed"
          python scripts/chmi_dualpol.py \
            || echo "WARN: chmi_dualpol failed"

          if [ -n "${R2_PUBLIC_URL:-}" ]; then
            base="${R2_PUBLIC_URL%/}"
            mkdir -p public/data/satellite public/data/formation public/data/wind
            curl -fsS "$base/data/satellite/cooling.json" \
              -o public/data/satellite/cooling.json \
              && echo "pulled cooling.json from R2" \
              || echo "WARN: could not pull cooling from R2 — merge uses checkout"
            curl -fsS "$base/data/formation/grid.json" \
              -o public/data/formation/grid.json \
              && echo "pulled formation/grid.json from R2" \
              || echo "WARN: could not pull formation from R2"
            curl -fsS "$base/data/wind/low.json" \
              -o public/data/wind/low.json \
              && curl -fsS "$base/data/wind/upper.json" \
              -o public/data/wind/upper.json \
              && echo "pulled wind from R2" \
              || echo "WARN: could not pull wind from R2"
          fi
          python scripts/refresh_env_if_stale.py --skip-sat \
            || echo "WARN: env refresh failed — keep previous formation/wind"
          python scripts/merge_sat_cooling.py
          python scripts/write_meta.py

      - name: Upload full radar tree to R2
        if: steps.gate.outputs.skip != 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/upload_data_r2.py --exclude data/satellite/

      - name: Learning emit (kalibrace — T+15/30 ověření)
        if: steps.gate.outputs.skip != 'true'
        run: python scripts/emit_learning.py
        continue-on-error: true

      - name: Git backup (meta + radar + learning)
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/meta.json public/data/opera public/data/chmi public/data/national public/data/wind public/data/formation public/data/learning
          if git diff --staged --quiet; then
            echo "No git backup changes."
          else
            git commit -m "chore: refresh radar + learning"
            git pull --rebase origin main || true
            git push origin main || echo "WARN: git backup push failed (non-fatal, R2 already updated)"
          fi

      - name: Skipped (R2 fresh)
        if: steps.gate.outputs.skip == 'true'
        run: echo "Skipped — map frame fresh (${{ steps.gate.outputs.age_min }} min)"
