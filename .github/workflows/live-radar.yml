# Stáhne radar → R2 (rychlé CDN) + volitelný git backup.
# Cíl: ~5–7 min od snímku. Primární trigger: Cloudflare Worker (workers/radar-trigger).
# Viz docs/RADAR-TRIGGER.md

name: Live radar

on:
  workflow_dispatch:
  repository_dispatch:
    types: [live-radar]
  schedule:
    # GitHub cron je nespolehlivý — záloha; hlavní je Cloudflare Cron Worker
    - cron: "*/5 * * * *"
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

concurrency:
  group: live-radar
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache OPERA + CHMI HDF5
        uses: actions/cache@v4
        with:
          path: |
            .cache/opera
            .cache/chmi
            .cache/chmi_dualpol
          key: radar-h5-v2-${{ github.run_id }}
          restore-keys: |
            radar-h5-v2-
            radar-h5-v1-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch radar (OPERA + ČHMÚ + dual-pol + env)
        run: |
          python scripts/opera_fetch_convert.py --frames 6
          python scripts/chmi_radar.py
          python scripts/chmi_dualpol.py
          python scripts/refresh_env_if_stale.py
          python scripts/write_meta.py

      - name: Learning emit (kalibrace — T+15/30 ověření)
        run: python scripts/emit_learning.py
        continue-on-error: true

      - name: Upload to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/upload_data_r2.py

      - name: Git backup (meta + radar + learning)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/meta.json public/data/opera public/data/chmi public/data/wind public/data/formation public/data/learning
          if git diff --staged --quiet; then
            echo "No git backup changes."
          else
            git commit -m "chore: refresh radar + learning"
            git push
          fi
