# Stáhne radar → R2 (rychlé CDN) + volitelný git backup.
# Cíl: ~5–7 min od snímku. Satelit NEblokuje radar (až po R2).
# Viz docs/RADAR-TRIGGER.md

name: Live radar

on:
  workflow_dispatch:
  repository_dispatch:
    types: [live-radar]
  schedule:
    # GitHub cron je nespolehlivý — záloha; hlavní je Cloudflare Cron Worker (*/5)
    - cron: "*/10 * * * *"

permissions:
  contents: write

# Nezrušovat běh uprostřed — jinak se R2 nikdy neaktualizuje při více triggerech
concurrency:
  group: live-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if R2 already fresh
        id: gate
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          MAX_AGE_MIN: "4"
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/check_r2_fresh.py

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache OPERA + CHMI HDF5
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            .cache/opera
            .cache/chmi
            .cache/chmi_dualpol
          key: radar-h5-v2-${{ github.run_id }}
          restore-keys: |
            radar-h5-v2-
            radar-h5-v1-

      - name: Install Python deps
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements.txt

      # --- RYCHLÁ CESTA: radar → R2 (sat až potom) ---
      - name: Fetch radar (OPERA + ČHMÚ + dual-pol + env bez sat)
        if: steps.gate.outputs.skip != 'true'
        env:
          EUMETSAT_CONSUMER_KEY: ${{ secrets.CONSUMER_KEY_EUMETSAT }}
          EUMETSAT_CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET_EUMETSAT }}
        run: |
          python scripts/opera_fetch_convert.py --frames 7
          python scripts/chmi_radar.py
          python scripts/chmi_dualpol.py
          python scripts/refresh_env_if_stale.py --skip-sat
          python scripts/write_meta.py

      - name: Upload radar to Cloudflare R2
        if: steps.gate.outputs.skip != 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/upload_data_r2.py --exclude data/satellite/

      # --- POMALÁ CESTA: satelit (neblokuje radar freshness) ---
      - name: Satellite cooling (best-effort, after R2)
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        env:
          EUMETSAT_CONSUMER_KEY: ${{ secrets.CONSUMER_KEY_EUMETSAT }}
          EUMETSAT_CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET_EUMETSAT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python scripts/refresh_env_if_stale.py --sat-only
          # I když sat fetch skipne (cadence), merge + upload z checkoutu opraví R2 po race
          python scripts/merge_sat_cooling.py
          python scripts/write_meta.py
          # Jen sat + formation merge + meta — ať souběžný radar run nepřepíše starým cooling.json
          python scripts/upload_data_r2.py --only data/satellite/ --only data/formation/ --only data/meta.json

      - name: Learning emit (kalibrace — T+15/30 ověření)
        if: steps.gate.outputs.skip != 'true'
        run: python scripts/emit_learning.py
        continue-on-error: true

      - name: Git backup (meta + radar + learning)
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/meta.json public/data/opera public/data/chmi public/data/wind public/data/formation public/data/satellite public/data/learning
          if git diff --staged --quiet; then
            echo "No git backup changes."
          else
            git commit -m "chore: refresh radar + learning"
            git pull --rebase origin main || true
            git push origin main || echo "WARN: git backup push failed (non-fatal, R2 already updated)"
          fi

      - name: Skipped (R2 fresh)
        if: steps.gate.outputs.skip == 'true'
        run: echo "Skipped — R2 meta fresh (${{ steps.gate.outputs.age_min }} min ago)"
