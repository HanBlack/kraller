# Stáhne radar → push do Gitu. Prohlížeč čte raw.githubusercontent.com.
# Důležité: cancel-in-progress: false — jinak se běhy ruší uprostřed a data zestárnou.

name: Live radar

on:
  workflow_dispatch:
  schedule:
    - cron: "12,42 * * * *"
  workflow_run:
    workflows: ["Publish site"]
    types: [completed]

permissions:
  actions: write
  contents: write

concurrency:
  group: live-radar
  # false = nechat běžící job doběhnout (push dat). true rušilo job → data stála hodiny.
  cancel-in-progress: false

jobs:
  update:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch OPERA (+ vítr když stárne)
        run: |
          python scripts/opera_fetch_convert.py --frames 6
          python - <<'PY'
          import os, subprocess, sys
          sys.path.insert(0, "scripts")
          from datetime import datetime, timezone
          from data_freshness import age_minutes, read_valid_at

          now = datetime.now(timezone.utc)
          wind = "public/data/wind/low.json"
          form = "public/data/formation/grid.json"
          wind_age = age_minutes(read_valid_at(wind), now) if os.path.isfile(wind) else 999.0
          form_age = age_minutes(read_valid_at(form), now) if os.path.isfile(form) else 999.0
          print(f"wind_age={wind_age} formation_age={form_age}")
          if form_age is None or form_age > 90:
              subprocess.run([sys.executable, "scripts/fetch_formation.py"], check=False)
          if wind_age is None or wind_age > 40:
              subprocess.run([sys.executable, "scripts/fetch_wind.py", "--force"], check=False)
          PY
          python scripts/write_meta.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            python scripts/touch_meta.py
            git add public/data/meta.json
          fi
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh radar data"
            git push
          fi

      # Další běh až PO úspěšném pushi — žádný overlap se spánkem.
      - name: Queue next refresh
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 120
          gh workflow run live-radar.yml --ref main
          echo "Next Live radar queued."
