# Po každém deployi počká → stáhne radar → deploy. Spouští Publish site znovu (střídavá smyčka).

name: Refresh live radar

on:
  workflow_run:
    workflows: ["Publish site"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kraller-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Wait before next fetch
        if: github.event_name == 'workflow_run'
        run: sleep 120

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch OPERA radar
        run: npm run data:radar

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
