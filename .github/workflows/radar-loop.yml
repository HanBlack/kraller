# Po deployi: stáhne radar → commit → push spustí Publish site znovu (udržitelná smyčka).

name: Radar refresh loop

on:
  workflow_run:
    workflows: ["Publish site"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-refresh-loop
  cancel-in-progress: false

jobs:
  refresh:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache OPERA HDF5
        uses: actions/cache@v4
        with:
          path: .cache/opera
          key: opera-h5-${{ github.run_id }}
          restore-keys: |
            opera-h5-

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Wait before next fetch
        if: github.event_name == 'workflow_run'
        run: sleep 120

      - name: Fetch OPERA radar
        run: npm run data:radar

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "Radar frame unchanged — bumping meta timestamp to keep loop alive."
            python scripts/touch_meta.py
            git add public/data/meta.json
          fi
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: refresh radar data"
          git push
